##
## Paste this into your /etc/nginx/sites-enabled/zrbus config.
## Apply with: sudo nginx -t && sudo systemctl reload nginx
##

server {
    server_name zrbus.ddns.net;

    root /home/deploy/zr-bus/frontend/dist;
    index index.html;

    # ── Gzip compression (improves Core Web Vitals / LCP) ─────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers (Google favours secure sites) ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self)" always;

    # ── Cache static assets aggressively (Vite hashes filenames) ──────────────
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|webp|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Service worker: never cache (must always be fresh) ─────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Sitemap (served by NestJS at root, outside the /api/ prefix) ──────────
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zrbus.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zrbus.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = zrbus.ddns.net) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name zrbus.ddns.net;
    return 404;
}
